
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Sora:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0f1117;--surface:#181c27;--surface2:#1e2334;--border:#2a3045;--accent:#4f8ef7;--accent2:#6ee7b7;--text:#e2e8f0;--muted:#64748b;--danger:#f87171;--mono:'JetBrains Mono',monospace;--sans:'Sora',sans-serif}
  .root{font-family:var(--sans);background:var(--bg);color:var(--text);height:600px;display:flex;flex-direction:column;border-radius:12px;overflow:hidden;border:1px solid var(--border)}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
  .logo{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--accent);letter-spacing:0.04em}
  .logo span{color:var(--accent2)}
  .status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
  .dot.on{background:#4ade80;box-shadow:0 0 6px #4ade8066}
  .dot.off{background:var(--danger)}
  .body{display:flex;flex:1;overflow:hidden}
  .sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
  .sidebar-head{padding:12px;border-bottom:1px solid var(--border);flex-shrink:0}
  .sidebar-title{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px}
  .search-wrap{position:relative}
  .search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px 6px 28px;font-size:12px;color:var(--text);font-family:var(--sans);outline:none}
  .search-wrap input:focus{border-color:var(--accent)}
  .search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:12px;height:12px;color:var(--muted)}
  .notes-list{flex:1;overflow-y:auto;padding:8px}
  .notes-list::-webkit-scrollbar{width:3px}
  .notes-list::-webkit-scrollbar-track{background:transparent}
  .notes-list::-webkit-scrollbar-thumb{background:var(--border)}
  .note-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:6px;cursor:pointer;transition:border-color 0.15s}
  .note-item:hover{border-color:var(--accent)}
  .note-item-head{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
  .note-title{font-size:12px;font-weight:500;color:var(--text);line-height:1.4;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .del-btn{background:none;border:none;cursor:pointer;padding:2px;color:var(--muted);border-radius:4px;flex-shrink:0;display:flex;align-items:center}
  .del-btn:hover{color:var(--danger)}
  .note-content{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .note-date{font-size:10px;color:var(--muted);margin-top:6px;font-family:var(--mono)}
  .empty-notes{text-align:center;padding:24px 12px;color:var(--muted);font-size:12px}
  .empty-notes .icon{font-size:24px;margin-bottom:8px;opacity:0.4}
  .chat{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
  .messages::-webkit-scrollbar{width:3px}
  .messages::-webkit-scrollbar-track{background:transparent}
  .messages::-webkit-scrollbar-thumb{background:var(--border)}
  .msg{display:flex;gap:10px;max-width:88%}
  .msg.user{align-self:flex-end;flex-direction:row-reverse}
  .avatar{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;font-family:var(--mono)}
  .avatar.user{background:#1e3a5f;color:var(--accent)}
  .avatar.agent{background:#1a3028;color:var(--accent2)}
  .bubble{padding:9px 13px;border-radius:10px;font-size:13px;line-height:1.6}
  .msg.user .bubble{background:#1e2f4a;border:1px solid #2a4068;border-bottom-right-radius:3px;color:var(--text)}
  .msg.agent .bubble{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:3px;color:var(--text)}
  .thinking{display:flex;gap:4px;align-items:center;padding:9px 13px}
  .thinking span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce 1.2s ease-in-out infinite}
  .thinking span:nth-child(2){animation-delay:0.2s}
  .thinking span:nth-child(3){animation-delay:0.4s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
  .input-area{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
  .input-area input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 14px;font-size:13px;color:var(--text);font-family:var(--sans);outline:none}
  .input-area input:focus{border-color:var(--accent)}
  .input-area input::placeholder{color:var(--muted)}
  .send-btn{background:var(--accent);border:none;border-radius:8px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity 0.15s}
  .send-btn:hover{opacity:0.85}
  .send-btn:disabled{opacity:0.4;cursor:not-allowed}
  .hint{font-size:11px;color:var(--muted);padding:0 12px 8px;text-align:center;font-family:var(--mono)}
</style>

<div class="root">
  <div class="topbar">
    <div class="logo">smart_notepad <span>//</span> mcp</div>
    <div class="status">
      <div class="dot" id="dot"></div>
      <span id="status-text">checking...</span>
    </div>
  </div>
  <div class="body">
    <div class="sidebar">
      <div class="sidebar-head">
        <div class="sidebar-title">saved notes</div>
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5L14 14"/>
          </svg>
          <input type="text" id="search-input" placeholder="search notes..." oninput="filterNotes(this.value)">
        </div>
      </div>
      <div class="notes-list" id="notes-list">
        <div class="empty-notes">
          <div class="icon">📝</div>
          <div>loading notes...</div>
        </div>
      </div>
    </div>
    <div class="chat">
      <div class="messages" id="messages">
        <div class="msg agent">
          <div class="avatar agent">AI</div>
          <div class="bubble">Hello! I'm your smart notepad agent. I can save, read, search, and delete notes for you. What would you like to do?</div>
        </div>
      </div>
      <div class="hint">FastAPI must be running at localhost:8000</div>
      <div class="input-area">
        <input type="text" id="chat-input" placeholder="Ask the agent to save, read, or search notes..." onkeydown="handleKey(event)">
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M14 8L2 2l3 6-3 6 12-6z" fill="white"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
const BASE = 'http://127.0.0.1:8000';
let allNotes = [];

async function checkStatus(){
  try{
    const r = await fetch(BASE+'/notes',{signal:AbortSignal.timeout(2000)});
    if(r.ok){
      document.getElementById('dot').className='dot on';
      document.getElementById('status-text').textContent='FastAPI online';
      loadNotes();
    }
  }catch(e){
    document.getElementById('dot').className='dot off';
    document.getElementById('status-text').textContent='FastAPI offline';
    document.getElementById('notes-list').innerHTML='<div class="empty-notes"><div class="icon">⚠️</div><div>Start FastAPI first</div></div>';
  }
}

async function loadNotes(){
  try{
    const r = await fetch(BASE+'/notes');
    allNotes = await r.json();
    renderNotes(allNotes);
  }catch(e){}
}

function renderNotes(notes){
  const el = document.getElementById('notes-list');
  if(!notes.length){
    el.innerHTML='<div class="empty-notes"><div class="icon">📭</div><div>No notes yet</div></div>';
    return;
  }
  el.innerHTML = notes.map(n=>`
    <div class="note-item">
      <div class="note-item-head">
        <div class="note-title">${escHtml(n.title)}</div>
        <button class="del-btn" onclick="deleteNote('${escHtml(n.title)}')" title="delete">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M2 2l8 8M10 2L2 10"/>
          </svg>
        </button>
      </div>
      <div class="note-content">${escHtml(n.content)}</div>
      <div class="note-date">${new Date(n.created_at).toLocaleDateString()}</div>
    </div>
  `).join('');
}

function filterNotes(q){
  const filtered = allNotes.filter(n=>
    n.title.toLowerCase().includes(q.toLowerCase())||
    n.content.toLowerCase().includes(q.toLowerCase())
  );
  renderNotes(filtered);
}

async function deleteNote(title){
  try{
    await fetch(`${BASE}/notes/${encodeURIComponent(title)}`,{method:'DELETE'});
    addMsg('agent',`Note "${title}" deleted successfully!`);
    loadNotes();
  }catch(e){
    addMsg('agent','Error deleting note. Is FastAPI running?');
  }
}

function handleKey(e){if(e.key==='Enter')sendMessage()}

async function sendMessage(){
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if(!msg) return;
  input.value='';
  addMsg('user', msg);
  const btn = document.getElementById('send-btn');
  btn.disabled=true;
  const thinkId = addThinking();
  try{
    const r = await fetch(BASE+'/agent',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:msg})
    });
    removeThinking(thinkId);
    if(r.ok){
      const data = await r.json();
      addMsg('agent', data.reply);
      loadNotes();
    } else {
      addMsg('agent','Agent error. Make sure FastAPI + MCP server is running.');
    }
  }catch(e){
    removeThinking(thinkId);
    addMsg('agent', 'Agent error: ' + (e.message || 'Unknown error. Check terminal for details.'));
  }
  btn.disabled=false;
}

function addMsg(role, text){
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className=`msg ${role}`;
  div.innerHTML=`<div class="avatar ${role}">${role==='user'?'ME':'AI'}</div><div class="bubble">${escHtml(text)}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
  return div;
}

function addThinking(){
  const msgs = document.getElementById('messages');
  const id = 'think-'+Date.now();
  const div = document.createElement('div');
  div.className='msg agent';
  div.id=id;
  div.innerHTML=`<div class="avatar agent">AI</div><div class="bubble thinking"><span></span><span></span><span></span></div>`;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
  return id;
}

function removeThinking(id){
  const el=document.getElementById(id);
  if(el) el.remove();
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

checkStatus();
setInterval(checkStatus, 10000);
</script>
